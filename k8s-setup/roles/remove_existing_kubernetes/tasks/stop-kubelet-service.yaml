- name: Stop kubelet service if present (all supported distributions)
  block:
    - name: Stop kubelet (CentOS family)
      ansible.builtin.service:
        name: kubelet
        state: stopped
      # ignore_errors: true
      when: ansible_facts['distribution'] == "CentOS"
      register: kubelet_stop_result
      failed_when: >
        kubelet_stop_result.failed
        and ("Could not find the requested service" not in (kubelet_stop_result.msg | default('')))

    - name: Stop kubelet (Fedora)
