- name: Remove Kubernetes packages (hard reset only) for all supported distributions
  block:
    - name: Ensure port 6443 is free
      shell: lsof -i :6443 | awk 'NR>1 {print $2}' | xargs -r kill -9
      ignore_errors: true

    - name: Remove Kubernetes packages (CentOS family)
      ansible.builtin.package:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: absent
      when:
        - ansible_facts['distribution'] == "CentOS"
        - remove_k8s_packages | default(false)

    - name: Remove Kubernetes packages (Fedora)
      ansible.builtin.package:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: absent
      when:
        - ansible_facts['distribution'] == "Fedora"
        - remove_k8s_packages | default(false)

    - name: Remove Kubernetes packages (Debian family)
      ansible.builtin.package:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: absent
      when:
        - ansible_facts['distribution'] == "Debian"
        - remove_k8s_packages | default(false)

    - name: Remove Kubernetes packages (SUSE family)
      ansible.builtin.package:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: absent
      when:
        - ansible_facts['distribution'] == "Suse"
        - remove_k8s_packages | default(false)

    - name: Remove Kubernetes packages (Arch Linux)
      ansible.builtin.package:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: absent
      when:
        - ansible_facts['distribution'] == "Archlinux"
        - remove_k8s_packages | default(false)

    - name: Remove Kubernetes packages (Alpine Linux)
      ansible.builtin.package:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: absent
      when:
        - ansible_facts['distribution'] == "Alpine"
        - remove_k8s_packages | default(false)
