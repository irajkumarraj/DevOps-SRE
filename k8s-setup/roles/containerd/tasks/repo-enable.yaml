- name: Enable distribution-specific repos
  block:
    # RHEL / CentOS CRB
    - name: Enable CRB repo on RHEL/CentOS
      ansible.builtin.command: dnf config-manager --set-enabled crb
      become: true
      register: crb_result
      changed_when: "'enabled' in crb_result.stdout or crb_result.rc == 0"
      when: "'CentOS' in distributors_to_update and ansible_facts['distribution'] == 'CentOS'"


