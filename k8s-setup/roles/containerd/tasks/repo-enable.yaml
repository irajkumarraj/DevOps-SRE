    # SUSE Package Hub / virtualization repo
    - name: Enable SUSE Package Hub repo
      community.general.zypper_repository:
        name: virtualisation
        description: "Virtualisation repository"
        repo: "http://download.opensuse.org/repositories/Virtualization/openSUSE_Tumbleweed/"
        enabled: true
        autorefresh: true
      become: true
      register: suse_repo_result
      changed_when: suse_repo_result.changed
      when: "'Suse' in distributors_to_update and ansible_facts['distribution'] == 'Suse'"

    # Arch community repo
    - name: Ensure Arch community repo is enabled
      ansible.builtin.lineinfile:
        path: /etc/pacman.conf
        regexp: '^\s*#?Include = /etc/pacman.d/mirrorlist$'
        line: 'Include = /etc/pacman.d/mirrorlist'
        state: present
      become: true
      when: "'Arch' in distributors_to_update and ansible_facts['distribution'] == 'Arch'"

    - name: Update pacman database (Arch)
      community.general.pacman:
        update_cache: true
      become: true
      when: "'Arch' in distributors_to_update and ansible_facts['distribution'] == 'Arch'"

    # Alpine community repo
    - name: Enable Alpine community repo
      ansible.builtin.lineinfile:
        path: /etc/apk/repositories
        regexp: '^#?http.*alpine/edge/community'
        line: "http://dl-cdn.alpinelinux.org/alpine/{{ ansible_facts.distribution_version }}/community"
        state: present
      become: true
      when: "'Alpine' in distributors_to_update and ansible_facts['distribution'] == 'Alpine'"

    - name: Update apk cache (Alpine)
      community.general.apk:
        update_cache: true
      become: true
      when: "'Alpine' in distributors_to_update and ansible_facts['distribution'] == 'Alpine'"
